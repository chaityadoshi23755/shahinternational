<!DOCTYPE html><html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decor Finder | Shah International</title>
  <link rel="shortcut icon" href="sites/default/files/favicon_v3_2024_0.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <div id="shared-header"></div>
  
  <section class="tech-directory-header reveal">
    <div class="container">
      <h1>Decor Finder</h1>
      <ol class="breadcrumb" style="padding-left: 0;"><li><a href="index.html">Home</a></li><li>Decor Finder</li></ol>
    </div>
  </section>

  <section class="page-content">
    <div class="container">
      <div class="decor-finder-layout">
        <aside class="filter-sidebar" style="background: #fff; padding: 1.5rem; border: 1px solid var(--color-text);">
          <h3>Filters</h3>
          <button id="clear-filters" class="btn btn-secondary" style="margin-bottom:1rem; width:100%;">Clear Filters</button>
          
          <div class="filter-group">
            <h4 class="filter-title">Principal</h4>
            <div class="filter-options">
              <label><input type="checkbox" value="schattdecor" class="filter-checkbox" data-filter-type="principal"> Schattdecor</label>
              <label><input type="checkbox" value="kingdecor" class="filter-checkbox" data-filter-type="principal"> Kingdecor</label>
            </div>
          </div>
          
          <div class="filter-group">
            <h4 class="filter-title">Color Group</h4>
            <div class="filter-options">
              <label><input type="checkbox" value="oak" class="filter-checkbox" data-filter-type="color"> Oak</label>
              <label><input type="checkbox" value="walnut" class="filter-checkbox" data-filter-type="color"> Walnut</label>
              <label><input type="checkbox" value="grey" class="filter-checkbox" data-filter-type="color"> Grey</label>
              <label><input type="checkbox" value="blue" class="filter-checkbox" data-filter-type="color"> Blue</label>
              <label><input type="checkbox" value="white" class="filter-checkbox" data-filter-type="color"> White</label>
            </div>
          </div>

          <div class="filter-group">
            <h4 class="filter-title">Application</h4>
            <div class="filter-options">
              <label><input type="checkbox" value="furniture" class="filter-checkbox" data-filter-type="application"> Furniture</label>
              <label><input type="checkbox" value="flooring" class="filter-checkbox" data-filter-type="application"> Flooring</label>
            </div>
          </div>
        </aside>

        <main class="decor-results">
          <div class="results-header">
            <p><span id="result-count">0</span> decors found</p>
          </div>
          <div id="decor-grid" class="card-grid grid-cols-4">
            <!-- Decors will be injected here via JS -->
          </div>
        </main>
      </div>
      <script src="decor-data.js"></script>
      <script src="decor-finder.js"></script>
    </div>
</section>
  
  <div id="shared-footer"></div>
  <script src="includes.js?v=2"></script>

</body></html>
