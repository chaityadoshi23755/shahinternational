<!DOCTYPE html><html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decor Collection | Shah International</title>
  <link rel="shortcut icon" href="sites/default/files/favicon_v3_2024_0.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="shared-header"></div>
  <section class="page-banner" style="background-color: var(--color-bg-dark);">
    <div class="page-banner-overlay" style="background: linear-gradient(135deg, rgba(26,26,26,0.9), rgba(26,26,26,0.7));"></div>
    <div class="page-banner-content">
      <h1>Decor Collection</h1>
      <ol class="breadcrumb"><li><a href="index.html">Home</a></li><li>Decor Collection</li></ol>
    </div>
  </section>
  <section class="page-content">
    <div class="container">
      <div class="grid" style="grid-template-columns: 280px 1fr; gap: 2rem; align-items: start;">
        
        <!-- Sidebar Filter -->
        <aside class="product-sidebar" style="background: #fff; padding: 1.5rem; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); position: sticky; top: 100px;">
          <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Filter Products</h3>
          
          <div style="margin-bottom: 1.5rem;">
            <h4 style="margin-bottom: 0.5rem; font-size: 1rem; color: var(--color-brand-red);">Search</h4>
            <input type="text" placeholder="Search decors..." style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;">
          </div>
          
          <div style="margin-bottom: 1.5rem;">
            <h4 style="margin-bottom: 0.5rem; font-size: 1rem; color: var(--color-brand-red);">Categories</h4>
            <ul style="list-style: none; padding: 0;">
              <li style="margin-bottom: 0.5rem;"><label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;"><input type="checkbox"> Woodgrains</label></li>
              <li style="margin-bottom: 0.5rem;"><label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;"><input type="checkbox"> Solid Colors</label></li>
              <li style="margin-bottom: 0.5rem;"><label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;"><input type="checkbox"> Stone & Marble</label></li>
              <li style="margin-bottom: 0.5rem;"><label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;"><input type="checkbox"> Abstract</label></li>
            </ul>
          </div>
          
          <div style="margin-bottom: 1.5rem;">
            <h4 style="margin-bottom: 0.5rem; font-size: 1rem; color: var(--color-brand-red);">Finish</h4>
            <ul style="list-style: none; padding: 0;">
              <li style="margin-bottom: 0.5rem;"><label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;"><input type="checkbox"> High Gloss</label></li>
              <li style="margin-bottom: 0.5rem;"><label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;"><input type="checkbox"> Suede / Matte</label></li>
              <li style="margin-bottom: 0.5rem;"><label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;"><input type="checkbox"> Textured</label></li>
            </ul>
          </div>
          
          <button class="btn btn-primary" style="width: 100%; justify-content: center;">Apply Filters</button>
        </aside>

        <!-- Product Grid -->
        <div class="card-grid grid-cols-3">
        
        <a href="woodgrains.html" class="card">
          <div class="card-img-wrap">
            <img src="sites/default/files/2019-03/Beaches.jpg" alt="Woodgrains" class="card-img">
          </div>
          <div class="card-body">
            <h3 class="card-title">Woodgrains</h3>
          </div>
        </a>
        
        <a href="Stone-and-Marble.html" class="card">
          <div class="card-img-wrap">
            <img src="sites/default/files/2019-05/Stone_Marble_collage.jpg" alt="Stone &amp; Marble" class="card-img">
          </div>
          <div class="card-body">
            <h3 class="card-title">Stone &amp; Marble</h3>
          </div>
        </a>
        <a href="Unique-colors.html" class="card">
          <div class="card-img-wrap">
            <img src="sites/default/files/2019-03/Unique%20colors-collage.jpg" alt="Unique colors" class="card-img">
          </div>
          <div class="card-body">
            <h3 class="card-title">Unique colors</h3>
          </div>
        </a>
        
      </div> <!-- End Product Grid -->
      </div> <!-- End Layout Grid -->
    </div>
  </section>
  <div id="shared-footer"></div>
  <script src="includes.js"></script>

</body></html>
