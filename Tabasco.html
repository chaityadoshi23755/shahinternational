<!DOCTYPE html><html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabasco | Shah International</title>
  <link rel="shortcut icon" href="sites/default/files/favicon_v3_2024_0.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <div id="shared-header"></div>
  
  <section class="tech-directory-header reveal">
    <div class="container">
      <h1 style="font-size: 2rem;">Tabasco</h1>
      <ol class="breadcrumb" style="padding-left: 0;"><li><a href="index.html">Home</a></li><li>Tabasco</li></ol>
    </div>
  </section>
        
  <section class="page-content">
    <div class="container">
      
      <div class="pdp-grid-55-45 reveal">
        <div class="pdp-info">
          <h3>Tabasco</h3>
          <div class="pdp-desc">
            <p>This decor is part of the Unique Colours collection – a selection of solid hues chosen to complement our trend themes and new decors.</p>
                                  <p><strong>Decor No : 14-60000-021</strong></p>
                                  <p><strong>Decor available in 4 ft only</strong></p>
          </div>
          <div class="pdp-actions">
            <a href="#" class="pdp-btn pdp-btn-red"><i class="fa-solid fa-file-pdf"></i> Download PDF</a>
            <a href="#" class="pdp-btn pdp-btn-outline"><i class="fa-solid fa-swatchbook"></i> Request Sample</a>
            <button class="pdp-btn pdp-btn-outline" onclick="openDecorRepeat(document.getElementById('main-product-image').src)"><i class="fa-solid fa-maximize"></i> Whole Decor Repeat</button>
          </div>
        </div>
        
        <div class="pdp-image-col">
          <img id="main-product-image" src="sites/default/files/2019-04/14-60000-021_Tabasco%20JPEG.jpg" class="pdp-main-img" alt="Tabasco" onclick="openDecorRepeat(this.src)">
          <div class="pdp-thumbnails">
            <img src="sites/default/files/2019-04/14-60000-021_Tabasco%20JPEG.jpg" class="pdp-thumb" onclick="updateMainImage('sites/default/files/2019-04/14-60000-021_Tabasco%20JPEG.jpg', this)">

          </div>
        </div>
      </div>
      
      

      <script>
        function updateMainImage(src, el) {
          document.getElementById('main-product-image').src = src;
          
          document.querySelectorAll('.pdp-thumb').forEach(t => t.classList.remove('active'));
          if(el) el.classList.add('active');
        }
      </script>
        
    </div>
  </section>
  <div id="shared-footer"></div>
  <script src="includes.js?v=2"></script>

</body></html>
